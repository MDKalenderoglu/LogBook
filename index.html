<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LogBook">
<meta name="theme-color" content="#5B5BD6">
<title>LogBook</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9D%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#FAF9F6; --surface:#FFFFFF; --surface2:#F3F1EC; --border:#E8E5DF;
  --text:#37352F; --text2:#8A8477; --accent:#5B5BD6; --accent-soft:#EDEDFB;
  --green:#3E8E5A; --green-soft:#E6F2EA; --amber:#B57E1E; --amber-soft:#F9F0DD;
  --red:#C4442E; --red-soft:#FAE9E5; --shadow:0 1px 3px rgba(60,55,45,.07),0 4px 16px rgba(60,55,45,.05);
}
[data-theme="dark"]{
  --bg:#1B1A18; --surface:#232220; --surface2:#2B2A27; --border:#383631;
  --text:#ECEAE4; --text2:#9B968C; --accent:#8583E8; --accent-soft:#2E2D45;
  --green:#6CBF8B; --green-soft:#22322A; --amber:#D9A94E; --amber-soft:#37301F;
  --red:#E07B67; --red-soft:#3A2521; --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Inter",sans-serif;
  background:var(--bg); color:var(--text); font-size:15px; line-height:1.5;
  -webkit-font-smoothing:antialiased; overscroll-behavior:none;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea,select{font:inherit;color:inherit}
#app{display:flex;height:100vh;height:100dvh}

/* ---------- Sidebar ---------- */
#sidebar{
  width:248px;flex-shrink:0;background:var(--surface2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:14px 10px;gap:2px;overflow-y:auto;
  transition:transform .25s ease;
}
.brand{display:flex;align-items:center;gap:8px;padding:6px 10px 14px;font-weight:700;font-size:16px;cursor:pointer}
.brand .logo{width:26px;height:26px;border-radius:7px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px}
.navitem{
  display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;width:100%;
  color:var(--text2);font-weight:500;font-size:14px;text-align:left;
}
.navitem:hover{background:var(--border);color:var(--text)}
.navitem.active{background:var(--accent-soft);color:var(--accent)}
.navitem .count{margin-left:auto;font-size:12px;color:var(--text2);font-variant-numeric:tabular-nums}
.navsec{margin:14px 10px 6px;font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--text2);text-transform:uppercase;display:flex;align-items:center}
.navsec button{margin-left:auto;color:var(--text2);font-size:15px;line-height:1;padding:0 4px;border-radius:5px}
.navsec button:hover{color:var(--accent)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.navitem .tw{width:13px;flex-shrink:0;color:var(--text2);font-size:10px;text-align:center;transition:transform .15s}
.navitem .tw.open{transform:rotate(90deg)}
.navitem.subcat{padding-left:36px;font-size:13.5px}
.navitem .subadd{margin-left:2px;opacity:0;font-size:14px;color:var(--text2);line-height:1}
.navitem:hover .subadd{opacity:1}
.navitem .subadd:hover{color:var(--accent)}
.subcat-row{padding:2px 10px 4px 36px}
.subcat-row input{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:7px;background:var(--surface);outline:none;font-size:12.5px}
#newcat-row{display:none;padding:4px 10px}
#newcat-row input{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:7px;background:var(--surface);outline:none;font-size:13px}
.sidebar-footer{margin-top:auto;padding-top:12px;display:flex;gap:6px;padding-left:6px;padding-right:6px}
.sidebar-footer button{flex:1;padding:7px 4px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:12.5px;color:var(--text2)}
.sidebar-footer button:hover{color:var(--text);border-color:var(--text2)}

/* ---------- Main ---------- */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{display:flex;align-items:center;gap:10px;padding:14px 22px 10px}
#hamburger{display:none;font-size:20px;padding:4px 8px;border-radius:8px}
#viewtitle{font-size:20px;font-weight:700;flex-shrink:0}
#search{
  margin-left:auto;width:min(260px,40vw);padding:7px 12px;border:1px solid var(--border);
  border-radius:9px;background:var(--surface);outline:none;font-size:13.5px;
}
#search:focus{border-color:var(--accent)}
#content{flex:1;overflow-y:auto;padding:6px 22px 60px}
.inner{max-width:780px;margin:0 auto}

/* quick add */
#quickadd{
  display:flex;gap:8px;align-items:center;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:6px 6px 6px 14px;box-shadow:var(--shadow);margin:8px 0 18px;
}
#quickadd:focus-within{border-color:var(--accent)}
#qa-input{flex:1;border:none;outline:none;background:none;font-size:15px;padding:8px 0}
#qa-input::placeholder{color:var(--text2)}
.qa-btn{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--text2)}
.qa-btn:hover{background:var(--surface2);color:var(--accent)}
.qa-btn.primary{background:var(--accent);color:#fff}
.qa-btn.primary:hover{opacity:.9;color:#fff}

/* note card */
.note{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden;
}
/* Editör açıkken overflow serbest — PDF/görsel sabit (sticky) kapatma çubuğu yapışabilsin */
.note.exp{overflow:visible}
.note-head{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;cursor:pointer}
.chk{
  width:21px;height:21px;border-radius:50%;border:1.6px solid var(--text2);flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;transition:all .15s;
}
.chk:hover{border-color:var(--green);color:var(--green);background:var(--green-soft)}
.note.done .chk{background:var(--green);border-color:var(--green);color:#fff}
.note-body{flex:1;min-width:0}
.note-title{font-weight:600;font-size:15px;word-wrap:break-word}
.note.done .note-title,.note.done .note-preview{text-decoration:line-through;color:var(--text2)}
.note-preview{
  color:var(--text2);font-size:13.5px;white-space:pre-wrap;word-wrap:break-word;margin-top:2px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.note-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center}
.chip{
  display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;
  padding:2.5px 9px;border-radius:99px;background:var(--surface2);color:var(--text2);border:1px solid transparent;
}
button.chip:hover{border-color:var(--text2)}
.chip.dl-ok{background:var(--accent-soft);color:var(--accent)}
.chip.dl-soon{background:var(--amber-soft);color:var(--amber)}
.chip.dl-over{background:var(--red-soft);color:var(--red)}
.chip.audio-chip{background:var(--surface2)}
.created{font-size:11.5px;color:var(--text2)}

/* editor (expanded) */
.editor{border-top:1px solid var(--border);padding:14px 15px;background:var(--surface)}
.editor input.title{width:100%;border:none;outline:none;background:none;font-weight:700;font-size:16px;margin-bottom:6px}
.editor textarea{
  width:100%;min-height:110px;border:none;outline:none;background:none;resize:vertical;
  font-size:14.5px;line-height:1.6;
}
.editor-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px}
.editor-row label{font-size:12.5px;color:var(--text2);font-weight:600}
.editor-row input[type="datetime-local"],.editor-row select{
  padding:5px 8px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);font-size:13px;outline:none;
}
.tool{
  display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);font-size:13px;font-weight:600;color:var(--text2);
}
.tool:hover{color:var(--accent);border-color:var(--accent)}
.tool.danger:hover{color:var(--red);border-color:var(--red)}
.tool.rec{background:var(--red);border-color:var(--red);color:#fff;animation:pulse 1.4s infinite}
.qa-btn.dicting,.tool.dicting{background:var(--red);border-color:var(--red);color:#fff;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}

/* audio players */
.audios{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.player{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 12px}
.player .pbtn{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.player canvas{flex:1;height:36px;min-width:0}
.player .ptime{font-size:11.5px;color:var(--text2);font-variant-numeric:tabular-nums;flex-shrink:0}
#recbar{display:flex;align-items:center;gap:10px;margin-top:12px;background:var(--red-soft);border:1px solid var(--red);border-radius:10px;padding:8px 12px}
#recbar canvas{flex:1;height:36px;min-width:0}
#rectime{font-size:12px;font-weight:700;color:var(--red);font-variant-numeric:tabular-nums}

/* note history */
.nlog{margin-top:12px;border-top:1px dashed var(--border);padding-top:10px;font-size:12.5px;color:var(--text2)}
.nlog div{padding:2px 0}
.nlog b{color:var(--text);font-weight:600}

/* subtasks */
.chk-sm{width:17px;height:17px;font-size:10px;margin-top:2px;border-width:1.4px}
.subs-title{font-size:12px;font-weight:700;color:var(--text2);margin:12px 0 4px;text-transform:uppercase;letter-spacing:.04em}
.sub{display:flex;gap:8px;align-items:flex-start;padding:3px 0;font-size:14px}
.sub.done .chk-sm{background:var(--green);border-color:var(--green);color:#fff}
.sub.done span{text-decoration:line-through;color:var(--text2)}
.sub-add input{width:100%;border:none;outline:none;background:none;font-size:13.5px;padding:5px 0;color:var(--text)}
.sub-add input::placeholder{color:var(--text2)}

/* files — Notion tarzı satır içi görüntüleme */
.files{display:flex;flex-direction:column;gap:12px;margin-top:12px}
.fbox{width:100%}
.frow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.fctl{display:flex;gap:4px;margin-left:auto}
.fctl .fchip{padding:5px 9px;font-size:13px}
.fctl .fchip:disabled{opacity:.3;cursor:default}
.fctl .fdel:hover{border-color:var(--red);color:var(--red)}
.fimg img{max-width:100%;max-height:360px;border-radius:10px;border:1px solid var(--border);cursor:zoom-in;display:block}
.fmeta{font-size:11.5px;color:var(--text2);margin-top:4px}
.fpdf{display:none;margin-top:8px}
.fpdf iframe{width:100%;height:520px;border:1px solid var(--border);border-radius:10px;background:#fff}
/* PDF üzerine kalemle çizim */
.inkclose{position:sticky;top:0;z-index:6;display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);border-radius:9px;
  padding:6px 8px;margin-bottom:8px;box-shadow:var(--shadow)}
.inkclose-lbl{flex:1;font-size:12.5px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inkclose [data-close]{background:var(--accent);color:#fff;border-radius:7px;padding:6px 12px;font-weight:600}
.inkbar{position:sticky;top:44px;z-index:5;background:var(--bg);display:flex;gap:6px;align-items:center;margin:8px 0;flex-wrap:wrap;padding:4px 0}
.inkbar .hint{margin-left:auto}
.inkc{width:26px;height:26px;border-radius:50%;border:2.5px solid transparent;flex-shrink:0}
.inkc.on{border-color:var(--text)}
.inkpage{position:relative;margin-bottom:10px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff}
.inkpage canvas{display:block;width:100%}
.inkpage .inkoverlay{position:absolute;left:0;top:0;width:100%;height:100%;touch-action:pan-y pinch-zoom;cursor:crosshair}
.fbox audio{width:100%;margin-top:2px}
.fbox video{max-width:100%;max-height:360px;border-radius:10px;border:1px solid var(--border);display:block}
.fchip{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;border:1px solid var(--border);border-radius:9px;background:var(--surface2);font-size:12.5px;font-weight:600;color:var(--text);max-width:100%;text-align:left}
.fchip:hover{border-color:var(--accent);color:var(--accent)}
.fchip small{color:var(--text2);font-size:10.5px;font-weight:400}
.thumbstrip{display:flex;gap:6px;margin-top:8px}
.thumbstrip img{width:52px;height:52px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:10px;cursor:zoom-out;padding:12px}
#lightbox img{max-width:98vw;max-height:94vh;width:auto;height:auto;border-radius:6px;object-fit:contain}
#lightbox div{color:#fff;font-size:13px;opacity:.85}

/* rendered note content: links + subheadings */
.note-preview a,.sub a{color:var(--accent);text-decoration:underline;word-break:break-all}
.note-preview .pdate{display:flex;align-items:center;gap:10px;color:var(--text2);font-size:11.5px;font-weight:700;margin:8px 0 4px;font-variant-numeric:tabular-nums}
.note-preview .pdate::before,.note-preview .pdate::after{content:"";height:1px;background:var(--border);flex:1}
.note-preview .ph1{font-weight:700;font-size:15px;color:var(--text)}
.note-preview .ph2{font-weight:700;font-size:14px;color:var(--text)}
.note-preview .ph3{font-weight:600;font-size:13.5px;color:var(--text)}
.editor .hint{font-size:11.5px;color:var(--text2);margin-top:4px}

/* timeline (Günlük) */
.day-h{font-size:13px;font-weight:700;color:var(--text2);margin:20px 0 8px;text-transform:capitalize}
.tl-item{
  display:flex;gap:10px;align-items:baseline;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:9px 13px;margin-bottom:6px;font-size:13.5px;
}
.tl-time{font-variant-numeric:tabular-nums;color:var(--text2);font-size:12px;flex-shrink:0}
.tl-note{color:var(--accent);cursor:pointer;font-weight:600}
.tl-note:hover{text-decoration:underline}

.empty{text-align:center;color:var(--text2);padding:60px 20px;font-size:14px}
.empty .big{font-size:38px;margin-bottom:10px}

/* cat popover */
#pop{
  position:fixed;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:10px;
  box-shadow:var(--shadow);padding:5px;display:none;min-width:150px;
}
#pop button{display:flex;align-items:center;gap:8px;width:100%;padding:6px 10px;border-radius:7px;font-size:13.5px;text-align:left}
#pop button:hover{background:var(--surface2)}

/* sync */
#syncstat{font-size:11px;color:var(--text2);padding:6px 10px 0;text-align:center;min-height:16px;cursor:pointer}
#syncmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:90;align-items:center;justify-content:center;padding:20px}
.sync-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);max-width:440px;width:100%;padding:20px}
.sync-card h3{font-size:16px;margin-bottom:8px}
.sync-card p{font-size:13px;color:var(--text2);margin-bottom:8px}
.sync-card .sync-note{background:var(--accent-soft);color:var(--accent);border-radius:9px;padding:8px 11px;font-size:12.5px}
.sync-card input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:9px;background:var(--surface2);outline:none;font-size:14px;margin:8px 0 12px}
.sync-card input:focus{border-color:var(--accent)}
.sync-btns{display:flex;gap:8px;flex-wrap:wrap}
#sync-msg{font-size:12.5px;color:var(--text2);margin-top:10px;min-height:16px}

/* mobile */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:19}
@media(max-width:760px){
  #sidebar{position:fixed;z-index:20;height:100vh;height:100dvh;transform:translateX(-100%);box-shadow:var(--shadow)}
  #sidebar.open{transform:translateX(0)}
  #overlay.show{display:block}
  #hamburger{display:block}
  #topbar{padding:10px 14px 6px}
  #content{padding:4px 14px 80px}
}
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="brand"><div class="logo">📝</div>LogBook</div>
    <button class="navitem" data-view="active">📥 Aktif Notlar<span class="count" id="c-active"></span></button>
    <button class="navitem" data-view="done">✅ Tamamlananlar<span class="count" id="c-done"></span></button>
    <button class="navitem" data-view="log">🕘 Günlük (Log)</button>
    <div class="navsec">Kategoriler<button id="addcat" title="Kategori ekle">＋</button></div>
    <div id="newcat-row"><input id="newcat-input" placeholder="Kategori adı, Enter'a bas"></div>
    <div id="catlist"></div>
    <div class="sidebar-footer">
      <button id="themebtn">🌗 Tema</button>
      <button id="syncbtn">☁️ Senkron</button>
      <button id="exportbtn">⬇︎ Yedek</button>
      <button id="importbtn">⬆︎ Geri Yükle</button>
    </div>
    <div id="syncstat"></div>
    <input type="file" id="importfile" accept=".json" style="display:none">
  </nav>
  <div id="overlay"></div>
  <div id="main">
    <div id="topbar">
      <button id="hamburger">☰</button>
      <div id="viewtitle">Aktif Notlar</div>
      <input id="search" placeholder="Ara…">
    </div>
    <div id="content"><div class="inner">
      <form id="quickadd" autocomplete="off">
        <input id="qa-input" enterkeyhint="done" placeholder="Hızlı not al…  (Enter ile kaydet)">
        <button type="button" class="qa-btn" id="qa-dictate" title="Söyle, yazıya dökülsün">🗣</button>
        <button type="button" class="qa-btn" id="qa-mic" title="Sesli not (kayıt)">🎤</button>
        <button type="submit" class="qa-btn primary" id="qa-add" title="Ekle">＋</button>
      </form>
      <div id="list"></div>
    </div></div>
  </div>
</div>
<div id="pop"></div>
<div id="lightbox"><img alt=""><div id="lb-name"></div></div>
<div id="syncmodal">
  <div class="sync-card">
    <h3>☁️ Bulut Senkronu</h3>
    <div id="sync-body"></div>
    <div class="sync-btns" id="sync-btns"></div>
    <div id="sync-msg"></div>
  </div>
</div>

<script>
"use strict";
/* ================= STATE ================= */
const LS_KEY="nbmd_v1";
const CAT_COLORS=["#5B5BD6","#3E8E5A","#B57E1E","#C4442E","#2E7DB5","#8E5BAB","#5A8E7A","#B5573E"];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

function seed(){
  return {
    notes:[], appLog:[], theme:"auto",
    cats:[
      {id:"genel",name:"Genel",color:"#5B5BD6"},
      {id:"is",name:"İş",color:"#2E7DB5"},
      {id:"kisisel",name:"Kişisel",color:"#3E8E5A"},
      {id:"fikir",name:"Fikir",color:"#B57E1E"},
      {id:"acil",name:"Acil",color:"#C4442E"},
    ]
  };
}
let S; try{ S=JSON.parse(localStorage.getItem(LS_KEY))||seed(); }catch(e){ S=seed(); }
S.notes.forEach(n=>{ if(!n.files)n.files=[]; if(!n.subs)n.subs=[]; if(!n.revs)n.revs=[]; });
const save=()=>{ try{ localStorage.setItem(LS_KEY,JSON.stringify(S)); }catch(e){ console.error(e); } scheduleSync(); };

let view={type:"active",catId:null};
let expandedId=null, editSnapshot=null, searchQ="";

/* ================= HELPERS ================= */
const $=s=>document.querySelector(s);
const esc=s=>(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const linkify=s=>s.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
function renderContent(t){
  let out="";
  for(const line of (t||"").split("\n")){
    const d=line.match(/^⏱\s+(.*)/);
    if(d){ out+=`<div class="pdate">${esc(d[1])}</div>`; continue; }
    const m=line.match(/^(#{1,3})\s+(.*)/);
    if(m) out+=`<div class="ph${m[1].length}">${linkify(esc(m[2]))}</div>`;
    else out+=linkify(esc(line))+"\n";
  }
  return out.replace(/\n$/,"");
}
const fmtSize=b=>b>1048576?(b/1048576).toFixed(1)+" MB":Math.max(1,Math.round(b/1024))+" KB";
function fileIcon(f){
  const t=f.type||"", n=(f.name||"").toLowerCase();
  if(t.startsWith("image/"))return "🖼";
  if(t==="application/pdf"||n.endsWith(".pdf"))return "📄";
  if(n.match(/\.(docx?|odt|rtf|pages)$/))return "📃";
  if(n.match(/\.(xlsx?|csv|numbers)$/))return "📊";
  if(n.match(/\.(pptx?|key)$/))return "📽";
  if(t.startsWith("audio/"))return "🎵";
  if(t.startsWith("video/"))return "🎬";
  if(n.match(/\.(zip|rar|7z|tar|gz)$/))return "🗜";
  return "📎";
}
const urlCache=new Map();
async function fileURL(id){
  if(urlCache.has(id)) return urlCache.get(id);
  const b=await idbGet(id); if(!b) return null;
  const u=URL.createObjectURL(b); urlCache.set(id,u); return u;
}
const fmtDT=t=>new Date(t).toLocaleString("tr-TR",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
const fmtTime=t=>new Date(t).toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
const fmtDay=t=>new Date(t).toLocaleDateString("tr-TR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
const fmtDur=s=>{s=Math.round(s);return Math.floor(s/60)+":"+String(s%60).padStart(2,"0")};
function toLocalInput(t){ const d=new Date(t),p=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"T"+p(d.getHours())+":"+p(d.getMinutes()); }
function timeLeft(dl){
  const diff=new Date(dl).getTime()-Date.now(), abs=Math.abs(diff);
  const m=Math.floor(abs/6e4), h=Math.floor(m/60), d=Math.floor(h/24);
  const s=d>0?`${d} gün ${h%24} sa`:h>0?`${h} sa ${m%60} dk`:`${m} dk`;
  if(diff<0) return {txt:`⏰ ${s} gecikti`,cls:"dl-over"};
  return {txt:`⏳ ${s} kaldı`,cls:(diff<864e5?"dl-soon":"dl-ok")};
}
const catOf=id=>S.cats.find(c=>c.id===id);

function noteLog(n,a){ n.log.push({t:Date.now(),a}); n.updatedAt=Date.now(); }
function appLog(a,noteId){ S.appLog.push({t:Date.now(),a,noteId:noteId||null}); }

/* ================= INDEXEDDB (audio) ================= */
function idbOpen(){ return new Promise((res,rej)=>{
  const r=indexedDB.open("nbmd-audio",1);
  r.onupgradeneeded=()=>r.result.createObjectStore("audio");
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
});}
async function idbPut(id,blob){ const db=await idbOpen(); return new Promise((res,rej)=>{
  const tx=db.transaction("audio","readwrite"); tx.objectStore("audio").put(blob,id);
  tx.oncomplete=res; tx.onerror=()=>rej(tx.error);
});}
async function idbGet(id){ const db=await idbOpen(); return new Promise((res,rej)=>{
  const r=db.transaction("audio").objectStore("audio").get(id);
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
});}

function visibleNotes(){
  let arr=S.notes.filter(n=>{
    if(view.type==="active") return !n.done;
    if(view.type==="done") return n.done;
    if(view.type==="cat") return inCatTree(n.cat,view.catId) && !n.done;
    return false;
  });
  if(searchQ){ const q=searchQ.toLowerCase();
    arr=arr.filter(n=>(n.title+" "+n.content+" "+n.subs.map(s=>s.text).join(" ")+" "+n.files.map(f=>f.name).join(" ")).toLowerCase().includes(q)); }
  if(view.type==="done") return arr.sort((a,b)=>(b.doneAt||0)-(a.doneAt||0));
  return arr.sort((a,b)=>{
    if(a.deadline&&b.deadline) return new Date(a.deadline)-new Date(b.deadline);
    if(a.deadline) return -1; if(b.deadline) return 1;
    return b.updatedAt-a.updatedAt;
  });
}

const kidsOf=id=>S.cats.filter(k=>k.parent===id);
// noteCat, catId'nin kendisi mi yoksa herhangi bir derinlikteki alt-torunu mu? (sınırsız iç içe)
function inCatTree(noteCat,catId){
  let c=catOf(noteCat), guard=0;
  while(c&&guard++<50){ if(c.id===catId) return true; c=c.parent?catOf(c.parent):null; }
  return false;
}
// Bir kategorinin kök seviyesine kadar derinliği (girinti için)
function catDepth(id){ let c=catOf(id),d=0,g=0; while(c&&c.parent&&g++<50){ c=catOf(c.parent); d++; } return d; }
let subAddFor=null;
function renderSidebar(){
  document.querySelectorAll(".navitem[data-view]").forEach(b=>{
    b.classList.toggle("active", b.dataset.view===view.type && view.type!=="cat");
  });
  $("#c-active").textContent=S.notes.filter(n=>!n.done).length||"";
  $("#c-done").textContent=S.notes.filter(n=>n.done).length||"";
  const catBtn=(c,depth)=>{
    const cnt=S.notes.filter(n=>!n.done&&inCatTree(n.cat,c.id)).length;
    const kids=kidsOf(c.id);
    return `<button class="navitem ${depth?"subcat":""} ${view.type==="cat"&&view.catId===c.id?"active":""}" data-cat="${c.id}" style="padding-left:${10+depth*18}px">
      ${kids.length?`<span class="tw ${c.open?"open":""}" data-tw="${c.id}">▶</span>`:`<span class="tw"></span>`}
      <span class="dot" style="background:${c.color}"></span>${esc(c.name)}
      <span class="count">${cnt||""}</span>
      <span class="subadd" data-subadd="${c.id}" title="Alt kategori ekle">＋</span>
    </button>`;
  };
  function renderCatTree(c,depth){
    let html=catBtn(c,depth);
    if(c.open||subAddFor===c.id||kidsOf(c.id).some(k=>inSubAddChain(k.id))){
      html+=kidsOf(c.id).map(k=>renderCatTree(k,depth+1)).join("");
      if(subAddFor===c.id)
        html+=`<div class="subcat-row" style="padding-left:${34+depth*18}px"><input id="subcat-input" placeholder="Alt kategori adı, Enter"></div>`;
    }
    return html;
  }
  // subAddFor bir alt-torunda ise, atalarını açık göster
  function inSubAddChain(id){ let c=catOf(id),g=0; while(c&&g++<50){ if(c.id===subAddFor) return true; c=c.parent?catOf(c.parent):null; } return false; }
  $("#catlist").innerHTML=S.cats.filter(c=>!c.parent).map(c=>renderCatTree(c,0)).join("");
  $("#catlist").querySelectorAll("[data-cat]").forEach(b=>{
    b.onclick=e=>{
      const tw=e.target.closest("[data-tw]"), sa=e.target.closest("[data-subadd]");
      if(tw){ const c=catOf(tw.dataset.tw); c.open=!c.open; save(); renderSidebar(); return; }
      if(sa){ subAddFor=subAddFor===sa.dataset.subadd?null:sa.dataset.subadd; renderSidebar();
        $("#subcat-input")?.focus(); return; }
      setView({type:"cat",catId:b.dataset.cat});
    };
  });
  const si=$("#subcat-input");
  if(si) si.onkeydown=e=>{
    if(e.key==="Enter"&&si.value.trim()){
      const parent=catOf(subAddFor);
      S.cats.push({id:uid(),name:si.value.trim(),color:parent.color,parent:parent.id});
      parent.open=true;
      appLog("🏷 Yeni alt kategori: "+parent.name+" › "+si.value.trim());
      subAddFor=null; save(); render();
    }
    if(e.key==="Escape"){ subAddFor=null; renderSidebar(); }
  };
}

/* ---------- editor logic ---------- */
let autoDivider=null;
function expandNote(id){
  if(expandedId) collapseNote(true);
  expandedId=id;
  const n=S.notes.find(x=>x.id===id);
  editSnapshot={title:n.title,content:n.content};
  // Uzun aradan sonra dönülen nota otomatik tarih ayracı: yeni eklenenlerin
  // ne zaman yazıldığı notun İÇİNDE görünsün. Altına bir şey yazılmazsa kapanışta silinir.
  autoDivider=null;
  const lastLine=(n.content||"").trimEnd().split("\n").pop()||"";
  if((n.content||"").trim() && Date.now()-(n.updatedAt||0)>36e5 && !lastLine.startsWith("⏱")){
    autoDivider="⏱ "+fmtDT(Date.now());
    n.content=n.content.replace(/\s+$/,"")+"\n\n"+autoDivider+"\n";
  }
  render();
  const ed=$("#ed-content"); if(ed){ ed.focus(); ed.setSelectionRange(ed.value.length,ed.value.length); }
}
function editDiffSummary(o,n){
  const parts=[], cut=l=>l.length>60?l.slice(0,60)+"…":l;
  if((o.title||"")!==(n.title||"")) parts.push(`başlık: “${cut(o.title||"—")}” → “${cut(n.title||"—")}”`);
  const ol=(o.content||"").split("\n").map(s=>s.trim()).filter(Boolean);
  const nl=(n.content||"").split("\n").map(s=>s.trim()).filter(Boolean);
  const oset=new Set(ol), nset=new Set(nl);
  const added=nl.filter(l=>!oset.has(l)), removed=ol.filter(l=>!nset.has(l));
  for(const l of added.slice(0,3)) parts.push("＋ “"+cut(l)+"”");
  if(added.length>3) parts.push("＋ …ve "+(added.length-3)+" satır daha");
  for(const l of removed.slice(0,3)) parts.push("− “"+cut(l)+"”");
  if(removed.length>3) parts.push("− …ve "+(removed.length-3)+" satır daha");
  return parts;
}
function finalizeEdit(){
  // Editör kapanırken: önceki sürümü tarihçeye kaydet (hiçbir şey silinmez),
  // ne eklendiğini/çıkarıldığını satır bazında logla.
  const n=S.notes.find(x=>x.id===expandedId);
  if(!n||!editSnapshot) return;
  if(autoDivider){
    // Otomatik ayracın altına hiçbir şey yazılmadıysa ayracı iz bırakmadan kaldır
    const rx=autoDivider.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    n.content=n.content.replace(new RegExp("\\n*"+rx+"[ \\t]*\\s*$"),"");
    autoDivider=null;
  }
  if(n.title!==editSnapshot.title||n.content!==editSnapshot.content){
    if(!n.revs)n.revs=[];
    n.revs.push({t:Date.now(),title:editSnapshot.title,content:editSnapshot.content});
    const parts=editDiffSummary(editSnapshot,n);
    noteLog(n,"✏️ Düzenlendi"+(parts.length?" — "+parts.join(" · "):""));
    appLog("Düzenlendi: “"+titleOf(n)+"”"+(parts.length?" — "+parts.join(" · "):""),n.id);
    editSnapshot={title:n.title,content:n.content};
    save();
  }
}
function collapseNote(skipRender){
  stopDictation();
  finalizeEdit();
  if(recState.active) stopRecording();
  stopAllPlayers();
  expandedId=null; editSnapshot=null;
  if(!skipRender) render();
}

function renderSubs(n){
  const w=$("#ed-subs"); if(!w)return;

  w.innerHTML=(n.subs.length?`<div class="subs-title">Alt maddeler · ${done}/${n.subs.length}</div>`:"")+

      <span>${linkify(esc(s.text))}</span></div>`).join("")+
    `<form class="sub-add" id="sub-add"><input id="sub-input" autocomplete="off" enterkeyhint="done" placeholder="＋ Alt madde ekle…  (Enter)"></form>`;
  w.querySelectorAll("[data-subtoggle]").forEach(b=>{
    b.onclick=()=>{
      const s=n.subs.find(x=>x.id===b.dataset.subtoggle); if(!s)return;
      s.done=!s.done;
      noteLog(n,(s.done?"☑ Alt madde tamamlandı: ":"☐ Alt madde yeniden açıldı: ")+s.text);
      if(s.done) appLog("Alt madde tamamlandı: “"+s.text.slice(0,40)+"” — "+titleOf(n),n.id);

/* ---------- file attachments ---------- */
async function addFiles(n,fileList){
  let files=[...fileList].filter(f=>f&&f.size>0);
  // Pano yapıştırmasında macOS/Safari AYNI görseli birden çok formatta verir (png+jpeg+tiff).
  // Hepsi görselse ve adları jenerikse ("image.png" gibi) en uygun TEK formatı al — "1 yapıştırdım 3 eklendi" olmasın.
  const jenerik=f=>!f.name||/^(image|pasted|grafik|resim|blob)[\s.-]?/i.test(f.name);
  if(files.length>1&&files.every(f=>(f.type||"").startsWith("image/")&&jenerik(f))){
    files=[ files.find(f=>f.type==="image/png")||files.find(f=>f.type==="image/jpeg")
           ||files.find(f=>f.type!=="image/tiff")||files[0] ];
  }
  for(const f of files){
    if(f.size>50*1024*1024){ alert("“"+f.name+"” 50 MB sınırını aşıyor, eklenmedi."); continue; }
    if(n.files.some(x=>x.name===f.name&&x.size===f.size)){
      alert("“"+f.name+"” bu notta zaten ekli — tekrar eklenmedi."); continue; }
    const id=uid();
    try{ await idbPut(id,f); }catch(e){ alert("Dosya kaydedilemedi: "+e.message); continue; }
    const name=f.name||("pano-gorseli-"+new Date().toISOString().slice(0,16).replace(/[T:]/g,"-")+".png");
    n.files.push({id,name,type:f.type||"",size:f.size,t:Date.now()});
    noteLog(n,"📎 Dosya eklendi: "+name);
    appLog("Dosya eklendi: “"+titleOf(n)+"” ← "+name,n.id);
  }
  save(); render();
}
async function downloadFile(f){
  const url=await fileURL(f.id);
  if(!url){ alert("Dosya bulunamadı."); return; }
  const a=document.createElement("a"); a.href=url; a.download=f.name; a.click();
}

      box.innerHTML=`<div class="frow">
          <button class="fchip fview">📄 <span>${esc(f.name)}<br><small>${fmtSize(f.size)}${hasInk?" · ✏️ çizimli":""} · görüntüle / gizle</small></span></button>
          <button class="fchip fann" title="Kalemle üzerine yaz (Apple Pencil / fare)">✏️ Çiz</button>
          <button class="fchip fnew" title="Yeni sekmede aç">↗</button>
          <button class="fchip fdl" title="İndir">⬇︎ İndir</button>

      bindCtl();
      box.querySelector(".fnew").onclick=async()=>{
        const url=await fileURL(f.id);
        if(url) window.open(url,"_blank"); else alert("Dosya bulunamadı.");
      };
      const holder=box.querySelector(".fpdf");
      box.querySelector(".fview").onclick=async()=>{
        if(holder.style.display==="block"&&holder.dataset.mode==="view"){ holder.style.display="none"; return; }
        holder.dataset.mode="view"; holder.innerHTML=""; holder.style.display="block";
        holder.appendChild(makeCloseBar(holder,"📄 "+f.name));
        try{
          await loadPdfjs();
          const blob=await idbGet(f.id); if(!blob) throw new Error("Dosya bulunamadı");
          const pdf=await pdfjsLib.getDocument({data:await blob.arrayBuffer()}).promise;
          const cw=Math.max(holder.clientWidth,320), dpr=devicePixelRatio||1;
          for(let p=1;p<=pdf.numPages;p++){
            const page=await pdf.getPage(p);
            const vp0=page.getViewport({scale:1});
            const vp=page.getViewport({scale:cw/vp0.width*dpr});
            const cv=document.createElement("canvas"); cv.width=vp.width; cv.height=vp.height;
            const wrap=document.createElement("div"); wrap.className="inkpage"; wrap.style.cssText="margin-bottom:10px;border:none;border-radius:0";
            wrap.appendChild(cv); holder.appendChild(wrap);
            await page.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise;

        }catch(e){ holder.innerHTML="⚠️ "+e.message; }
      };
      box.querySelector(".fann").onclick=()=>{

    } else if(isAud||isVid){

          <button class="fchip fopen">${fileIcon(f)} <span>${esc(f.name)}<br><small>${fmtSize(f.size)} · ${fmtDT(f.t)} · indir/aç</small></span></button>

  }

/* ---------- PDF üzerine kalemle çizim (OneNote tarzı) ---------- */
/* pdf.js yalnızca ilk "Çiz" tıklamasında indirilir; service worker önbelleğe alır. */
let pdfjsLoading=null;
function loadPdfjs(){
  if(window.pdfjsLib) return Promise.resolve();
  if(pdfjsLoading) return pdfjsLoading;
  pdfjsLoading=new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=()=>{ pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"; res(); };
    s.onerror=()=>{ pdfjsLoading=null; rej(new Error("Çizim motoru indirilemedi — internet bağlantısı gerekli (bir kez)")); };
    document.head.appendChild(s);
  });
  return pdfjsLoading;
}
/* Sabit (sticky) kapatma çubuğu — uzun PDF/görselde en üste çıkmadan kapatılabilsin. */
function makeCloseBar(holder,label){
  const b=document.createElement("div"); b.className="inkclose";
  b.innerHTML=`<span class="inkclose-lbl">${label||""}</span><button class="tool" data-close>✕ Kapat</button>`;
  b.querySelector("[data-close]").onclick=()=>{ holder.style.display="none"; holder.innerHTML=""; holder.dataset.mode=""; };
  return b;
}
/* Ortak çizim motoru — PDF sayfaları ve görseller aynı kalem/silgi/geri-al mantığını paylaşır.
   registerPage(anahtar, overlayCanvas, W, H) ile her katman bağlanır; f.ink[anahtar] içine 0-1 normalize vuruşlar yazılır. */
function makeInkEngine(n,f,label){
  if(!f.ink) f.ink={};
  let color="#1B4FD8", alpha=1, width=0.004, eraser=false, lastPage=null, inkLogged=false, inkTimer=0;
  const pages={};
  const bar=document.createElement("div"); bar.className="inkbar";
  bar.innerHTML=`
    <button class="inkc on" data-c="#1B4FD8" style="background:#1B4FD8" title="Mavi kalem"></button>
    <button class="inkc" data-c="#C4442E" style="background:#C4442E" title="Kırmızı kalem"></button>
    <button class="inkc" data-c="#1B1A18" style="background:#1B1A18" title="Siyah kalem"></button>
    <button class="inkc" data-c="#F2C94C" style="background:#F2C94C" title="Fosforlu"></button>
    <button class="tool" data-eraser>🧽 Silgi</button>
    <button class="tool" data-undo>↩︎ Geri Al</button>
    <span class="hint">kalem/fare çizer · parmak kaydırır</span>`;
  bar.querySelectorAll(".inkc").forEach(b=>b.onclick=()=>{
    color=b.dataset.c; eraser=false;
    alpha=color==="#F2C94C"?0.45:1; width=color==="#F2C94C"?0.014:0.004;
    bar.querySelectorAll(".inkc").forEach(x=>x.classList.toggle("on",x===b));
    bar.querySelector("[data-eraser]").classList.remove("rec");
  });
  bar.querySelector("[data-eraser]").onclick=e=>{ eraser=!eraser; e.currentTarget.classList.toggle("rec",eraser); };
  bar.querySelector("[data-undo]").onclick=()=>{
    if(lastPage!=null&&(f.ink[lastPage]||[]).length){ f.ink[lastPage].pop(); redraw(lastPage); inkSaved(); }
  };
  function drawStroke(ctx,s,W,H){
    ctx.strokeStyle=s.c; ctx.lineWidth=Math.max(1,s.w*W); ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.globalAlpha=s.a||1;
    ctx.beginPath();
    s.pts.forEach((p,i)=> i?ctx.lineTo(p[0]*W,p[1]*H):ctx.moveTo(p[0]*W,p[1]*H));
    ctx.stroke(); ctx.globalAlpha=1;
  }
  function redraw(p){
    const pg=pages[p]; if(!pg)return;
    const ctx=pg.ov.getContext("2d");
    ctx.clearRect(0,0,pg.W,pg.H);
    for(const s of (f.ink[p]||[])) drawStroke(ctx,s,pg.W,pg.H);
  }
  function inkSaved(){
    n.updatedAt=Date.now();
    if(!inkLogged){ inkLogged=true;
      noteLog(n,"✏️ "+label+" üzerine çizim: "+f.name);
      appLog(label+" üzerine çizim: “"+titleOf(n)+"” ← "+f.name,n.id);
    }
    clearTimeout(inkTimer); inkTimer=setTimeout(()=>save(),800);
  }
  function eraseAt(p,[x,y]){
    const arr=f.ink[p]||[];
    for(let i=arr.length-1;i>=0;i--){
      if(arr[i].pts.some(pt=>Math.hypot(pt[0]-x,pt[1]-y)<0.02)){
        arr.splice(i,1); redraw(p); inkSaved(); break;
      }
    }
  }
  function attachInk(p,ov){
    let cur=null;
    const pos=e=>{ const r=ov.getBoundingClientRect();
      return [(e.clientX-r.left)/r.width,(e.clientY-r.top)/r.height]; };
    ov.addEventListener("pointerdown",e=>{
      if(e.pointerType==="touch") return; // parmak = kaydırma
      e.preventDefault();
      try{ ov.setPointerCapture(e.pointerId); }catch(err){}
      lastPage=p;
      if(eraser){ eraseAt(p,pos(e)); return; }
      cur={c:color,w:width,a:alpha,pts:[pos(e)]};
    });
    ov.addEventListener("pointermove",e=>{
      if(e.pointerType==="touch") return;
      if(eraser){ if(e.buttons) eraseAt(p,pos(e)); return; }
      if(!cur) return;
      cur.pts.push(pos(e));
      const pg=pages[p], ctx=pg.ov.getContext("2d"), k=cur.pts.length;
      ctx.strokeStyle=cur.c; ctx.lineWidth=Math.max(1,cur.w*pg.W); ctx.lineCap="round"; ctx.globalAlpha=cur.a;
      ctx.beginPath();
      ctx.moveTo(cur.pts[k-2][0]*pg.W,cur.pts[k-2][1]*pg.H);
      ctx.lineTo(cur.pts[k-1][0]*pg.W,cur.pts[k-1][1]*pg.H);
      ctx.stroke(); ctx.globalAlpha=1;
    });
    const up=()=>{
      if(cur&&cur.pts.length>1){ (f.ink[p]=f.ink[p]||[]).push(cur); inkSaved(); }
      cur=null; redraw(p);
    };
    ov.addEventListener("pointerup",up);
    ov.addEventListener("pointercancel",up);
  }
  function registerPage(p,ov,W,H){ pages[p]={ov,W,H}; redraw(p); attachInk(p,ov); }
  return {bar, registerPage};
}
async function openPdfAnnot(n,f,holder){
  holder.dataset.mode="ink"; holder.innerHTML=""; holder.style.display="block";
  holder.appendChild(makeCloseBar(holder,"✏️ "+f.name));
  const info=document.createElement("div"); info.className="fmeta"; info.textContent="Çizim modu hazırlanıyor…";
  holder.appendChild(info);
  let pdf;
  try{
    await loadPdfjs();
    const blob=await idbGet(f.id); if(!blob) throw new Error("Dosya bulunamadı");
    pdf=await pdfjsLib.getDocument({data:await blob.arrayBuffer()}).promise;
  }catch(e){ info.textContent="⚠️ "+e.message; return; }
  info.remove();
  const eng=makeInkEngine(n,f,"PDF");
  holder.appendChild(eng.bar);
  const cw=Math.max(holder.clientWidth,320), dpr=devicePixelRatio||1;
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const vp0=page.getViewport({scale:1});
    const vp=page.getViewport({scale:cw/vp0.width*dpr});
    const wrap=document.createElement("div"); wrap.className="inkpage";
    const cv=document.createElement("canvas"); cv.width=vp.width; cv.height=vp.height;
    const ov=document.createElement("canvas"); ov.className="inkoverlay"; ov.width=vp.width; ov.height=vp.height;
    wrap.appendChild(cv); wrap.appendChild(ov); holder.appendChild(wrap);
    // Kayıtlı çizimler ve kalem dinleyicileri render'ı BEKLEMEDEN bağlanır.
    eng.registerPage(p,ov,vp.width,vp.height);
    await page.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise;
  }
}
/* Görsel üzerine Apple Pencil / fare ile çizim — PDF ile aynı motor, tek "sayfa" (anahtar 1). */
async function openImageAnnot(n,f,holder){
  holder.dataset.mode="ink"; holder.innerHTML=""; holder.style.display="block";
  holder.appendChild(makeCloseBar(holder,"✏️ "+f.name));
  const info=document.createElement("div"); info.className="fmeta"; info.textContent="Görsel yükleniyor…";
  holder.appendChild(info);
  let url=null;
  try{ url=await fileURL(f.id); }catch(e){ info.textContent="⚠️ Dosya okunamadı: "+e.message; return; }
  if(!url){ info.textContent="⚠️ Dosya bulunamadı — bu ek başka cihazda eklendiyse önce eşitlenmesini bekle."; return; }
  const img=new Image();
  img.onload=()=>{
    info.remove();
    const eng=makeInkEngine(n,f,"Görsel");
    holder.appendChild(eng.bar);
    const cw=Math.max(holder.clientWidth,320), dpr=devicePixelRatio||1;
    const scale=cw/img.naturalWidth*dpr;
    const W=Math.round(img.naturalWidth*scale), H=Math.round(img.naturalHeight*scale);
    const wrap=document.createElement("div"); wrap.className="inkpage";
    const cv=document.createElement("canvas"); cv.width=W; cv.height=H;
    const ov=document.createElement("canvas"); ov.className="inkoverlay"; ov.width=W; ov.height=H;
    cv.getContext("2d").drawImage(img,0,0,W,H);
    wrap.appendChild(cv); wrap.appendChild(ov); holder.appendChild(wrap);
    eng.registerPage("1",ov,W,H);
  };
  img.onerror=()=>{ info.textContent="⚠️ Görsel açılamadı — dosya biçimi tarayıcıda desteklenmiyor olabilir (ör. TIFF/HEIC). Görseli 🗑 ile kaldırıp PNG veya JPEG olarak yeniden ekleyebilirsin."; };
  img.src=url;
}

/* ================= AUDIO ================= */
const recState={active:false,rec:null,chunks:[],note:null,start:0,raf:0,timer:0,stream:null,actx:null};
const players=[]; // {audio, raf}
function stopAllPlayers(){ players.forEach(p=>{ try{p.audio.pause()}catch(e){} }); players.length=0; }

async function startRecording(n){
  if(recState.active)return;
  stopDictation(); // mikrofon çakışmasın
  let stream;
  try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ alert("Mikrofon izni alınamadı: "+e.message); return; }
  const mime=["audio/mp4","audio/webm;codecs=opus","audio/webm"].find(m=>window.MediaRecorder&&MediaRecorder.isTypeSupported(m))||"";
  const rec=new MediaRecorder(stream, mime?{mimeType:mime}:undefined);
  Object.assign(recState,{active:true,rec,chunks:[],note:n,start:Date.now(),stream});
  rec.ondataavailable=e=>{ if(e.data.size)recState.chunks.push(e.data); };
  rec.onstop=onRecStop;
  rec.start(250);
  $("#recbar").style.display="flex"; $("#ed-rec").style.display="none";
  // live waveform
  const actx=new (window.AudioContext||window.webkitAudioContext)();
  recState.actx=actx;
  const src=actx.createMediaStreamSource(stream), an=actx.createAnalyser();
  an.fftSize=512; src.connect(an);
  const data=new Uint8Array(an.frequencyBinCount);
  const cv=$("#reccanvas"), ctx=cv.getContext("2d");
  function draw(){
    if(!recState.active)return;
    cv.width=cv.clientWidth*devicePixelRatio; cv.height=cv.clientHeight*devicePixelRatio;
    an.getByteTimeDomainData(data);
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue("--red");
    ctx.lineWidth=2*devicePixelRatio; ctx.beginPath();
    for(let i=0;i<data.length;i++){
      const x=i/data.length*cv.width, y=data[i]/255*cv.height;
      i?ctx.lineTo(x,y):ctx.moveTo(x,y);
    }
    ctx.stroke();
    $("#rectime").textContent=fmtDur((Date.now()-recState.start)/1000);
    recState.raf=requestAnimationFrame(draw);
  }
  draw();
}
function stopRecording(){
  if(!recState.active)return;
  recState.active=false;
  cancelAnimationFrame(recState.raf);
  try{ recState.rec.stop(); }catch(e){}
}
async function onRecStop(){
  recState.stream.getTracks().forEach(t=>t.stop());
  try{ recState.actx.close(); }catch(e){}
  const blob=new Blob(recState.chunks,{type:recState.rec.mimeType||"audio/webm"});
  const n=recState.note, dur=(Date.now()-recState.start)/1000;
  const aid=uid();
  try{ await idbPut(aid,blob); }catch(e){ alert("Ses kaydedilemedi: "+e.message); return; }
  n.audios.push({id:aid,dur,mime:blob.type,t:Date.now()});
  noteLog(n,"🎤 Ses kaydı eklendi ("+fmtDur(dur)+")");
  appLog("Ses kaydı: “"+titleOf(n)+"” ("+fmtDur(dur)+")",n.id);
  save(); render();
}

async function renderAudios(n){
  const wrap=$("#ed-audios"); if(!wrap)return;
  wrap.innerHTML="";
  for(const a of n.audios){
    const el=document.createElement("div");
    el.className="player";
    el.innerHTML=`<button class="pbtn">▶</button><canvas></canvas><span class="ptime">${fmtDur(a.dur)}<br><span style="font-size:10px">${fmtDT(a.t)}</span></span>`;
    wrap.appendChild(el);
    setupPlayer(el,a).catch(()=>{ el.querySelector(".ptime").textContent="Ses bulunamadı"; });
  }
}
async function setupPlayer(el,a){
  const blob=await idbGet(a.id);
  if(!blob) throw new Error("no blob");
  const url=URL.createObjectURL(blob);
  const audio=new Audio(url);
  const btn=el.querySelector(".pbtn"), cv=el.querySelector("canvas"), ctx=cv.getContext("2d");
  // peaks
  let peaks=null;
  try{
    const ab=await blob.arrayBuffer();
    const actx=new (window.AudioContext||window.webkitAudioContext)();
    const buf=await actx.decodeAudioData(ab);
    const ch=buf.getChannelData(0), N=72, step=Math.floor(ch.length/N);
    peaks=Array.from({length:N},(_,i)=>{
      let max=0; for(let j=i*step;j<(i+1)*step;j+=16) max=Math.max(max,Math.abs(ch[j]||0));
      return max;
    });
    const mx=Math.max(...peaks,.01); peaks=peaks.map(p=>p/mx);
    actx.close();
  }catch(e){ peaks=Array.from({length:72},()=>.15+Math.random()*.5); }
  function draw(progress){
    cv.width=cv.clientWidth*devicePixelRatio; cv.height=cv.clientHeight*devicePixelRatio;
    const css=getComputedStyle(document.documentElement);
    const cAcc=css.getPropertyValue("--accent"), cMut=css.getPropertyValue("--border");
    const bw=cv.width/peaks.length;
    peaks.forEach((p,i)=>{
      const h=Math.max(2*devicePixelRatio,p*cv.height*.85);
      ctx.fillStyle=(i/peaks.length)<=progress?cAcc:cMut;
      if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(i*bw+bw*.18,(cv.height-h)/2,bw*.64,h,bw*.3); ctx.fill(); }
      else ctx.fillRect(i*bw+bw*.18,(cv.height-h)/2,bw*.64,h);
    });
  }
  draw(0);
  let raf;
  function tick(){
    const d=audio.duration&&isFinite(audio.duration)?audio.duration:a.dur;
    draw(d?audio.currentTime/d:0);
    if(!audio.paused) raf=requestAnimationFrame(tick);
  }
  btn.onclick=()=>{
    if(audio.paused){
      stopAllPlayers(); players.push({audio});
      audio.play(); btn.textContent="❚❚"; tick();
    } else { audio.pause(); btn.textContent="▶"; cancelAnimationFrame(raf); }
  };
  audio.onended=()=>{ btn.textContent="▶"; draw(0); cancelAnimationFrame(raf); };
  audio.onpause=()=>{ btn.textContent="▶"; cancelAnimationFrame(raf); };
  cv.onclick=e=>{
    const r=cv.getBoundingClientRect(); const d=audio.duration&&isFinite(audio.duration)?audio.duration:a.dur;
    if(d){ audio.currentTime=((e.clientX-r.left)/r.width)*d; draw(audio.currentTime/d); }
  };
}

/* ================= DİKTE (sesten yazıya, Türkçe) ================= */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const dict={active:false,rec:null,target:null,btn:null,base:"",finals:""};
function stopDictation(){
  if(!dict.active)return;
  dict.active=false;
  try{ dict.rec.stop(); }catch(e){}
  if(dict.btn) dict.btn.classList.remove("dicting");
  if(dict.target) dict.target.dispatchEvent(new Event("input"));
}
function startDictation(target,btn){
  if(!SR){ alert("Bu tarayıcı sesten yazıya çevirmeyi desteklemiyor. Chrome, Edge veya Safari kullan."); return; }
  if(dict.active){ const same=dict.btn===btn; stopDictation(); if(same) return; }
  if(recState.active) stopRecording(); // mikrofon çakışmasın
  const r=new SR();
  r.lang="tr-TR"; r.continuous=true; r.interimResults=true;
  const sep=target.value&&!/\s$/.test(target.value)?" ":"";
  Object.assign(dict,{active:true,rec:r,target,btn,base:target.value+sep,finals:""});
  btn.classList.add("dicting");
  r.onresult=e=>{
    let interim="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal) dict.finals+=t.trim()+" ";
      else interim+=t;
    }
    dict.target.value=dict.base+dict.finals+interim;
    dict.target.dispatchEvent(new Event("input"));
    if(dict.target.tagName==="TEXTAREA") dict.target.scrollTop=dict.target.scrollHeight;
  };
  r.onerror=e=>{
    if(e.error==="not-allowed"||e.error==="service-not-allowed"){
      stopDictation(); alert("Mikrofon izni verilmedi — tarayıcı ayarlarından izin ver.");
    }
  };
  // Motor sessizlikte kendini kapatır; kullanıcı durdurmadıysa kaldığı yerden sürdür
  r.onend=()=>{ if(dict.active){ try{ r.start(); }catch(e){ stopDictation(); } } };
  try{ r.start(); }catch(e){ stopDictation(); alert("Dikte başlatılamadı: "+e.message); }
}

async function doImport(file){
  try{
    const data=JSON.parse(await file.text());
    if(!data.notes||!data.cats) throw new Error("Geçersiz yedek dosyası");
    if(!confirm("Yedek geri yüklenecek ve mevcut veriyle DEĞİŞTİRİLECEK. Devam edilsin mi?")) return;
    const audioMap=data._audio||{}; delete data._audio;

      const res=await fetch(dataUrl); await idbPut(id,await res.blob());

    S.syncOn=keep.syncOn; S.gEmail=keep.gEmail; S.lastSync=keep.lastSync;

}

/* Yayıncı ayarı: Google Cloud Console'dan alınan OAuth Client ID (GOOGLE-KURULUM.md rehberine bak).
   Client ID gizli değildir. Veriler kullanıcının KENDİ Drive'ının gizli uygulama alanında
   (appDataFolder) durur — uygulama Drive'daki diğer dosyaları göremez. */
const GOOGLE_CLIENT_ID="616517211151-oe2g0e2r32hpqfclrj83qmr9u8d3aujq.apps.googleusercontent.com";
const DRIVE_SCOPE="https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/userinfo.email";
const DRIVE_API="https://www.googleapis.com/drive/v3";
const DRIVE_UP="https://www.googleapis.com/upload/drive/v3";
let syncBusy=false, syncTimer=0, tokenClient=null;
const blobToDataURL=bl=>new Promise(res=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.readAsDataURL(bl)});

/* --- Google girişi (GIS token modeli) --- */
let gTok=null; try{ gTok=JSON.parse(localStorage.getItem("nbmd_gtok"))||null; }catch(e){}
const tokenValid=()=>!!(gTok&&Date.now()<gTok.exp-60000);
const gisReady=()=>!!(window.google&&google.accounts&&google.accounts.oauth2);
function dropToken(){ gTok=null; try{ localStorage.removeItem("nbmd_gtok"); }catch(e){} }
function getToken(interactive){
  return new Promise((res,rej)=>{
    if(tokenValid()) return res(gTok.access_token);
    if(!GOOGLE_CLIENT_ID) return rej(new Error("uygulamada Google Client ID tanımlı değil"));
    if(!gisReady()) return rej(new Error("Google bağlantısı yüklenemedi"));
    if(!tokenClient) tokenClient=google.accounts.oauth2.initTokenClient({client_id:GOOGLE_CLIENT_ID,scope:DRIVE_SCOPE,callback:()=>{}});
    tokenClient.callback=async t=>{
      if(t.error){
        const friendly={interaction_required:"Google girişi gerekiyor",login_required:"Google girişi gerekiyor",
          access_denied:"izin verilmedi",consent_required:"Google izni gerekiyor",
          invalid_request:"bu adres Google'da yetkili değil — uygulamayı yayın adresinden (github.io) veya localhost:8000'den aç"};
        return rej(new Error(friendly[t.error]||t.error_description||t.error));
      }
      gTok={access_token:t.access_token,exp:Date.now()+(Number(t.expires_in)||3600)*1000};
      try{ localStorage.setItem("nbmd_gtok",JSON.stringify(gTok)); }catch(e){}
      if(!S.gEmail){ try{
        const r=await fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+gTok.access_token}});
        if(r.ok) S.gEmail=(await r.json()).email||"";
      }catch(e){} }
      res(gTok.access_token);
    };
    tokenClient.error_callback=e=>rej(new Error(e&&e.type==="popup_closed"?"giriş penceresi kapatıldı":"Google giriş penceresi açılamadı"));
    tokenClient.requestAccessToken(interactive?{prompt:"select_account"}:{prompt:"",login_hint:S.gEmail||""});
  });
}

/* --- Drive REST yardımcıları (appDataFolder) --- */
const gh=t=>({Authorization:"Bearer "+t});
async function gFetch(url,opt){
  const r=await fetch(url,opt);
  if(r.status===401){ dropToken(); throw new Error("Google oturumu doldu"); }
  if(!r.ok) throw new Error("Drive hatası ("+r.status+")");
  return r;
}
async function driveList(t,q){
  let files=[],pt="";
  do{
    const u=DRIVE_API+"/files?spaces=appDataFolder&pageSize=1000&fields=nextPageToken,files(id,name)"+
      (q?"&q="+encodeURIComponent(q):"")+(pt?"&pageToken="+pt:"");
    const j=await(await gFetch(u,{headers:gh(t)})).json();
    files=files.concat(j.files||[]); pt=j.nextPageToken||"";
  }while(pt);
  return files;
}
const driveDownload=(t,id)=>gFetch(DRIVE_API+"/files/"+id+"?alt=media",{headers:gh(t)});
async function driveUpload(t,name,blob,existingId){
  if(existingId){
    await gFetch(DRIVE_UP+"/files/"+existingId+"?uploadType=media",
      {method:"PATCH",headers:{...gh(t),"Content-Type":blob.type||"application/octet-stream"},body:blob});
    return existingId;
  }
  const bnd="nbmd"+Date.now().toString(36);
  const body=new Blob([
    "--"+bnd+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"+
    JSON.stringify({name,parents:["appDataFolder"]})+
    "\r\n--"+bnd+"\r\nContent-Type: "+(blob.type||"application/octet-stream")+"\r\n\r\n",
    blob, "\r\n--"+bnd+"--"]);
  const j=await(await gFetch(DRIVE_UP+"/files?uploadType=multipart&fields=id",
    {method:"POST",headers:{...gh(t),"Content-Type":"multipart/related; boundary="+bnd},body})).json();
  return j.id;
}
let fidCache={}; try{ fidCache=JSON.parse(localStorage.getItem("nbmd_gfid"))||{}; }catch(e){}
const saveFid=()=>{ try{ localStorage.setItem("nbmd_gfid",JSON.stringify(fidCache)); }catch(e){} };
function unionLog(a,b){
  const seen=new Set(a.map(l=>l.t+"|"+l.a));
  for(const l of (b||[])) if(!seen.has(l.t+"|"+l.a)){ a.push(l); seen.add(l.t+"|"+l.a); }
  a.sort((x,y)=>x.t-y.t); return a;
}
function unionRevs(a,b){
  const seen=new Set(a.map(r=>r.t));
  for(const r of (b||[])) if(!seen.has(r.t)){ a.push(r); seen.add(r.t); }
  a.sort((x,y)=>x.t-y.t); return a;
}
function mergeRemote(remote){
  // Silme olmadığı için birleştirme güvenli: notlar birleşim, çakışmada yeni olan kazanır,
  // loglar ve önceki sürümler (revs) daima birleşir — hiçbir tarihçe kaybolmaz.
  const byId=new Map(S.notes.map(n=>[n.id,n]));
  for(const rn of remote.notes||[]){
    if(!rn.files)rn.files=[]; if(!rn.subs)rn.subs=[]; if(!rn.revs)rn.revs=[];
    const ln=byId.get(rn.id);
    if(!ln) S.notes.push(rn);
    else{
      const lg=unionLog([...ln.log],rn.log);
      const rv=unionRevs([...(ln.revs||[])],rn.revs);
      if((rn.updatedAt||0)>(ln.updatedAt||0)) Object.assign(ln,rn);
      ln.log=lg; ln.revs=rv;
    }
  }
  for(const c of remote.cats||[]) if(!S.cats.some(x=>x.id===c.id)) S.cats.push(c);
  unionLog(S.appLog,remote.appLog);
}
function setSyncStat(t){ const el=$("#syncstat"); if(el) el.textContent=t; }
let pendingSync=false;
function scheduleSync(){
  if(!S.syncOn)return;
  if(syncBusy){ pendingSync=true; return; } // eşitleme sürerken gelen değişiklik, bitince tekrar tetiklenir
  clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>syncNow(),4000);
}
function syncRender(){
  // Kullanıcı yazarken imleci kaçırmamak için açık editör varsa sadece kenar çubuğu tazelenir
  if(expandedId) renderSidebar(); else render();
}
async function syncNow(manual){
  if(!S.syncOn||syncBusy)return;
  syncBusy=true; setSyncStat("☁️ Eşitleniyor…");
  try{
    const t=await getToken(!!manual);
    const all=await driveList(t);
    let stateId=fidCache.state||null;
    if(!stateId){
      const f=all.find(x=>x.name==="notebookmd.json");
      if(f){ stateId=f.id; fidCache.state=stateId; saveFid(); }
    }
    if(stateId){
      try{ mergeRemote(await(await driveDownload(t,stateId)).json()); }
      catch(e){
        if(String(e.message).includes("404")){ stateId=null; delete fidCache.state; saveFid(); }
        else throw e;
      }
    }
    save(); syncRender();
    // --- blob senkronu (ses + dosyalar): sadece eksikler aktarılır ---
    const localIds=[]; S.notes.forEach(n=>{n.audios.forEach(a=>localIds.push(a.id)); n.files.forEach(f=>localIds.push(f.id));});
    const remoteBlobs=new Map(all.filter(f=>f.name.startsWith("blob-")).map(f=>[f.name.slice(5),f.id]));
    let gotNew=false;
    for(const bid of localIds){
      const have=await idbGet(bid);
      if(have && !remoteBlobs.has(bid)) await driveUpload(t,"blob-"+bid,have);
      else if(!have && remoteBlobs.has(bid)){
        await idbPut(bid,await(await driveDownload(t,remoteBlobs.get(bid))).blob());
        gotNew=true;
      }
    }
    const stateBlob=new Blob([JSON.stringify({notes:S.notes,cats:S.cats,appLog:S.appLog})],{type:"application/json"});
    fidCache.state=await driveUpload(t,"notebookmd.json",stateBlob,stateId); saveFid();
    S.lastSync=Date.now(); save();
    setSyncStat("☁️ Eşitlendi ✓ "+fmtTime(Date.now()));
    if(manual) syncMsg("Eşitleme başarılı ✓");
    if(gotNew) syncRender();
  }catch(e){
    console.error("sync",e);
    setSyncStat("☁️ ⚠️ "+(navigator.onLine?e.message+" — tekrar denemek için tıkla":"çevrimdışı — bağlanınca eşitlenecek"));
    if(manual) syncMsg("Hata: "+e.message);
  }
  syncBusy=false;
  if(pendingSync){ pendingSync=false; scheduleSync(); }
}

$("#qa-mic").onclick=()=>{
  const n=newNote("","Sesli not");
  render(); expandNote(n.id);
  setTimeout(()=>startRecording(n),100);
};
if(!SR) $("#qa-dictate").style.display="none";
$("#qa-dictate").onclick=()=>startDictation($("#qa-input"),$("#qa-dictate"));

$("#exportbtn").onclick=doExport;
$("#importbtn").onclick=()=>$("#importfile").click();
$("#importfile").onchange=e=>{ if(e.target.files[0]) doImport(e.target.files[0]); e.target.value=""; };

/* deadline ticker */
setInterval(()=>{
  document.querySelectorAll("[data-deadline]").forEach(el=>{
    const r=timeLeft(el.dataset.deadline);
    el.textContent=r.txt;
    el.className="chip "+r.cls;
  });
},30000);

/* ================= INIT ================= */
function render(){ renderSidebar(); renderMain(); }
function init(){
  applyTheme();
  (function sessionLog(){
    const last=[...S.appLog].reverse().find(e=>e.a==="🔓 Oturum açıldı");
    if(!last||Date.now()-last.t>60000){ appLog("🔓 Oturum açıldı"); save(); }
  })();
  render();
  /* PWA: çevrimdışı kabuk (yalnızca http/https'te; file:// açılışta atlanır) */
  if("serviceWorker" in navigator && location.protocol.startsWith("http"))
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  if(S.syncPass!==undefined) delete S.syncPass; // eski "senkron anahtarı" modeli kaldırıldı
  if(S.syncOn){
    setSyncStat("☁️ Senkron açık");
    let gisTry=0;
    (function waitGis(){
      if(tokenValid()||gisReady()) syncNow();
      else if(++gisTry<40) setTimeout(waitGis,250);
      else setSyncStat("☁️ ⚠️ Google yüklenemedi — tekrar denemek için tıkla");
    })();
  }
}
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init);
else init();
</script>
</body>
